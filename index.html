<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colpayo · Galería</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAF9F6;--bg2:#F2F0EB;--text:#1C1917;--t2:#6B6860;--t3:#A09D98;
  --border:#E5E2DC;--acc:#8B6F47;--acc-l:#F0E8DC;--wh:#FFFFFF;
  --martin:#DBEAFE;--martin-t:#1E40AF;
  --anita:#FCE7F3;--anita-t:#9D174D;
  --ambos:#E5E7EB;--ambos-t:#374151;
  --r:8px;--sw:224px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ── Mobile overlay ── */
#mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:490}

/* ── Sidebar ── */
#sidebar{
  width:var(--sw);flex-shrink:0;background:var(--wh);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100%;
}
#sb-head{padding:18px 16px 12px;border-bottom:1px solid var(--border)}
#sb-title{font-family:'Lora',serif;font-size:16px;font-weight:500}
#sb-sub{font-size:10.5px;color:var(--t3);margin-top:2px;text-transform:uppercase;letter-spacing:.08em}

/* Tabs */
#sb-tabs{display:flex;gap:4px;padding:10px 12px;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:12.5px;cursor:pointer;background:none;font-family:'DM Sans',sans-serif;color:var(--t2);text-align:center;transition:all .12s}
.tab.active{background:var(--acc);color:#fff;border-color:var(--acc)}
.tab:hover:not(.active){background:var(--bg)}

/* Room list */
#sb-rooms{flex:1;overflow-y:auto;padding:6px 0;display:flex;flex-direction:column}
.room-item{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;cursor:pointer;font-size:13.5px;color:var(--t2);border-left:2px solid transparent;transition:all .12s;user-select:none}
.room-item:hover{background:var(--bg);color:var(--text)}
.room-item.active{background:var(--acc-l);color:var(--acc);border-left-color:var(--acc);font-weight:500}
.rc{font-size:11px;background:var(--bg2);border-radius:10px;padding:1px 7px;color:var(--t3)}
.room-item.active .rc{background:rgba(139,111,71,.15);color:var(--acc)}
#sb-foot{padding:10px 12px;border-top:1px solid var(--border)}
#add-room-btn{width:100%;padding:7px;font-size:12px;background:none;border:1.5px dashed var(--border);border-radius:var(--r);color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .12s;font-family:'DM Sans',sans-serif}
#add-room-btn:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-l)}
#add-room-form{display:none}
#add-room-input{width:100%;padding:7px 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--r);outline:none;margin-bottom:6px;font-family:'DM Sans',sans-serif;background:var(--bg)}
#add-room-input:focus{border-color:var(--acc)}
.frow{display:flex;gap:6px}
.bsm{flex:1;padding:6px;font-size:12px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;font-family:'DM Sans',sans-serif;background:var(--wh);color:var(--t2);transition:all .12s}
.bsm.p{background:var(--acc);color:#fff;border-color:var(--acc)}.bsm.p:hover{opacity:.88}

/* Inventory sidebar filters */
#sb-inv{flex:1;overflow-y:auto;padding:12px;display:none;flex-direction:column;gap:12px}
.sb-filter-label{font-size:10.5px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.pb{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;cursor:pointer;background:none;font-family:'DM Sans',sans-serif;color:var(--t2);text-align:left;transition:all .12s;display:flex;align-items:center;gap:7px;margin-bottom:4px}
.pb:hover{background:var(--bg)}
.pb.active-m{background:var(--martin);color:var(--martin-t);border-color:var(--martin-t)}
.pb.active-a{background:var(--anita);color:var(--anita-t);border-color:var(--anita-t)}
.pb.active-all{background:var(--acc-l);color:var(--acc);border-color:var(--acc)}
.pb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
#inv-room-filter{width:100%;padding:7px 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);outline:none}
#inv-room-filter:focus{border-color:var(--acc)}

/* ── App body (sidebar + main) ── */
#app-body{flex:1;display:flex;overflow:hidden;min-height:0}

/* ── Mobile top bar ── */
#mob-bar{
  display:none;
  background:var(--wh);
  border-bottom:1px solid var(--border);
  padding:0;
  flex-shrink:0;
  flex-direction:column;
}
#mob-bar-top{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
}
#mob-menu-btn{
  background:none;border:1px solid var(--border);border-radius:var(--r);
  padding:6px 11px;cursor:pointer;font-size:17px;color:var(--t2);flex-shrink:0;
}
#mob-room-name{font-family:'Lora',serif;font-size:15px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#mob-action-btn{
  padding:7px 13px;background:var(--acc);color:#fff;border:none;border-radius:var(--r);
  font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;flex-shrink:0;
}
#mob-action-btn:disabled{opacity:.5;cursor:not-allowed}
/* Mobile view tabs */
#mob-tabs{display:flex;border-top:1px solid var(--border)}
.mob-tab{flex:1;padding:8px;text-align:center;font-size:13px;cursor:pointer;color:var(--t2);border-bottom:2px solid transparent;transition:all .12s;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif}
.mob-tab.active{color:var(--acc);border-bottom-color:var(--acc);font-weight:500}

/* ── Main ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* Photos view */
#photos-view{flex:1;display:flex;flex-direction:column;overflow:hidden}
#ph-head{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--wh);flex-shrink:0}
#room-title{font-family:'Lora',serif;font-size:18px;font-weight:500}
#room-meta{font-size:11.5px;color:var(--t3);margin-top:2px}
#upload-btn{padding:8px 16px;background:var(--acc);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .12s;white-space:nowrap}
#upload-btn:hover{opacity:.88}
#upload-btn:disabled{opacity:.45;cursor:not-allowed}
#photo-grid{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch}
#grid-inner{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.photo-card{position:relative;aspect-ratio:4/3;border-radius:var(--r);overflow:hidden;cursor:pointer;background:var(--bg2)}
.photo-card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .22s}
.photo-card:hover img{transform:scale(1.04)}
.pco{position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .15s}
.photo-card:hover .pco{background:rgba(0,0,0,.15)}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:280px;color:var(--t3);gap:10px;border:1.5px dashed var(--border);border-radius:12px;cursor:pointer;transition:all .15s;grid-column:1/-1;padding:20px}
.empty-state:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-l)}
.empty-state p{font-size:13.5px;text-align:center}
.upload-card{aspect-ratio:4/3;border:1.5px dashed var(--border);border-radius:var(--r);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t3);transition:all .15s}
.upload-card:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-l)}
.skeleton{background:linear-gradient(90deg,var(--bg2) 25%,var(--border) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.3s infinite;border-radius:var(--r);aspect-ratio:4/3}
@keyframes shimmer{to{background-position:-200% 0}}

/* ── Inventory view ── */
#inventory-view{flex:1;display:none;flex-direction:column;overflow:hidden}
#inv-head{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--wh);flex-shrink:0}
#inv-title{font-family:'Lora',serif;font-size:18px;font-weight:500}
#inv-meta{font-size:11.5px;color:var(--t3);margin-top:2px}
#add-item-btn{padding:8px 16px;background:var(--acc);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .12s}
#add-item-btn:hover{opacity:.88}
#inv-list{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch}
.inv-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--t3);gap:8px;font-size:13.5px;min-height:260px;text-align:center}
.item-card{background:var(--wh);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;cursor:pointer;transition:all .12s;display:flex;align-items:flex-start;gap:10px}
.item-card:hover{border-color:var(--acc);box-shadow:0 1px 8px rgba(139,111,71,.08)}
.item-card-body{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:4px}
.item-meta{font-size:12px;color:var(--t2);display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:11.5px;font-weight:500}
.badge-martin{background:var(--martin);color:var(--martin-t)}
.badge-anita{background:var(--anita);color:var(--anita-t)}
.badge-ambos{background:var(--ambos);color:var(--ambos-t)}
.badge-status{background:var(--bg2);color:var(--t2)}
.item-notes{font-size:12px;color:var(--t2);margin-top:5px;line-height:1.5}
.item-del{padding:6px 8px;background:none;border:1px solid var(--border);border-radius:6px;cursor:pointer;color:var(--t3);font-size:13px;transition:all .12s;flex-shrink:0}
.item-del:hover{background:#fee2e2;border-color:#fca5a5;color:#b91c1c}

/* ── Item modal ── */
#item-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:800;align-items:flex-end;justify-content:center}
#item-modal.open{display:flex}
#item-box{background:var(--wh);border-radius:14px 14px 0 0;padding:22px 22px 30px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto}
@media(min-width:641px){
  #item-modal{align-items:center}
  #item-box{border-radius:14px;padding:26px;max-height:88vh}
}
.modal-drag{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
#item-box h3{font-family:'Lora',serif;font-size:18px;font-weight:500;margin-bottom:16px}
.form-field{margin-bottom:13px}
.form-label{display:block;font-size:11.5px;font-weight:500;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.form-input,.form-select,.form-textarea{width:100%;padding:9px 11px;font-size:14px;border:1px solid var(--border);border-radius:var(--r);font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);outline:none;transition:border .12s;-webkit-appearance:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--acc)}
.form-textarea{resize:none;height:72px}
.person-select{display:flex;gap:8px}
.ps-opt{flex:1;padding:9px 6px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;font-size:13.5px;text-align:center;transition:all .12s;font-family:'DM Sans',sans-serif;background:none;color:var(--t2)}
.ps-opt.sel-m{background:var(--martin);color:var(--martin-t);border-color:var(--martin-t);font-weight:500}
.ps-opt.sel-a{background:var(--anita);color:var(--anita-t);border-color:var(--anita-t);font-weight:500}
.ps-opt.sel-b{background:var(--ambos);color:var(--ambos-t);border-color:var(--ambos-t);font-weight:500}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.btn-primary{flex:1;padding:10px;background:var(--acc);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer}
.btn-primary:hover{opacity:.88}
.btn-cancel{padding:10px 16px;background:none;border:1px solid var(--border);border-radius:var(--r);font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer;color:var(--t2)}

/* ── Progress bar ── */
#progress-bar{display:none;position:fixed;top:0;left:0;right:0;height:3px;background:var(--acc-l);z-index:999}
#progress-fill{height:100%;background:var(--acc);width:0%;transition:width .3s}

/* ── Lightbox ── */
#lightbox{display:none;position:fixed;inset:0;background:rgba(10,9,8,.93);z-index:1000;align-items:center;justify-content:center}
#lightbox.open{display:flex}
#lb-img{max-width:min(92vw,1200px);max-height:85vh;object-fit:contain;border-radius:6px}
#lb-close,#lb-prev,#lb-next{position:fixed;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:6px;color:#fff;cursor:pointer;font-size:20px;line-height:1;transition:background .12s}
#lb-close{top:14px;right:14px;padding:6px 12px}
#lb-prev{left:10px;top:50%;transform:translateY(-50%);padding:12px 14px}
#lb-next{right:10px;top:50%;transform:translateY(-50%);padding:12px 14px}
#lb-prev:hover,#lb-next:hover,#lb-close:hover{background:rgba(255,255,255,.22)}
#lb-counter{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.6);font-size:12px;background:rgba(0,0,0,.4);padding:4px 14px;border-radius:20px}
#lb-label{position:fixed;top:16px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.8);font-family:'Lora',serif;font-size:14px;font-style:italic;white-space:nowrap}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(70px);background:#1C1917;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;transition:transform .3s;z-index:2000;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ── Config overlay ── */
#config-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:3000;align-items:flex-end;justify-content:center}
#config-overlay.open{display:flex}
#config-box{background:var(--wh);border-radius:14px 14px 0 0;padding:24px 22px 36px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto}
@media(min-width:641px){
  #config-overlay{align-items:center}
  #config-box{border-radius:14px;padding:28px;max-height:88vh}
}
#config-box h2{font-family:'Lora',serif;font-size:20px;margin-bottom:6px}
.cfg-section{margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.cfg-section:last-of-type{border-bottom:none;margin-bottom:0}
.cfg-label{font-size:12px;font-weight:500;color:var(--t2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.05em}
.cfg-input{width:100%;padding:9px 11px;font-family:monospace;font-size:12px;border:1px solid var(--border);border-radius:var(--r);outline:none;background:var(--bg);color:var(--text);-webkit-appearance:none}
.cfg-input:focus{border-color:var(--acc)}
textarea.cfg-input{resize:none;height:140px;margin-bottom:0}
.cfg-hint{font-size:11.5px;color:var(--t3);margin-top:4px;line-height:1.5}
.cfg-hint code{background:var(--bg2);padding:1px 4px;border-radius:3px;font-size:11px}
#config-save{width:100%;padding:11px;background:var(--acc);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:14px}
#config-save:hover{opacity:.88}
#config-err{font-size:12px;color:#b91c1c;margin-top:8px;display:none;padding:8px 10px;background:#fee2e2;border-radius:6px}

/* ── Desktop layout ── */
@media(min-width:641px){
  body{flex-direction:row}
  #mob-bar{display:none!important}
  #ph-head,#inv-head{display:flex!important}
  #app-body{flex:1}
}
@media(max-width:640px){
  #mob-bar{display:flex}
  #sidebar{
    position:fixed;left:calc(-1 * var(--sw) - 10px);top:0;height:100%;
    z-index:500;transition:left .25s ease;
    box-shadow:none;
  }
  #sidebar.open{left:0;box-shadow:4px 0 24px rgba(0,0,0,.18)}
  #mob-overlay{display:none}
  #mob-overlay.show{display:block}
  #ph-head,#inv-head{display:none}
  #app-body{flex:1;min-height:0}
  #grid-inner{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
}
</style>
</head>
<body>

<div id="progress-bar"><div id="progress-fill"></div></div>
<div id="toast"></div>
<div id="mob-overlay" onclick="closeSidebar()"></div>

<!-- ══════════ MOBILE TOP BAR ══════════ -->
<div id="mob-bar">
  <div id="mob-bar-top">
    <button id="mob-menu-btn" onclick="openSidebar()" aria-label="Menú">☰</button>
    <span id="mob-room-name" style="font-family:'Lora',serif;font-size:15px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">—</span>
    <button id="mob-action-btn" onclick="mobAction()">↑ Subir</button>
  </div>
  <div id="mob-tabs">
    <button class="mob-tab active" id="mob-tab-photos" onclick="switchView('photos')">📷 Fotos</button>
    <button class="mob-tab" id="mob-tab-inv" onclick="switchView('inventory')">📦 Inventario</button>
  </div>
</div>

<!-- ══════════ APP BODY ══════════ -->
<div id="app-body">

  <!-- ── SIDEBAR ── -->
  <div id="sidebar">
    <div id="sb-head">
      <div id="sb-title">Colpayo</div>
      <div id="sb-sub">Galería · Inventario</div>
    </div>
    <div id="sb-tabs">
      <button class="tab active" id="tab-photos" onclick="switchView('photos')">📷 Fotos</button>
      <button class="tab" id="tab-inv" onclick="switchView('inventory')">📦 Inventario</button>
    </div>
    <div id="sb-rooms">
      <div id="room-list"></div>
      <div style="flex:1"></div>
      <div id="sb-foot">
        <button id="add-room-btn" onclick="showAddRoom()">
          <span style="font-size:16px">+</span> Agregar ambiente
        </button>
        <div id="add-room-form">
          <input id="add-room-input" placeholder="Nombre del ambiente" maxlength="40">
          <div class="frow">
            <button class="bsm p" onclick="saveRoom()">Guardar</button>
            <button class="bsm" onclick="hideAddRoom()">Cancelar</button>
          </div>
        </div>
      </div>
    </div>
    <div id="sb-inv">
      <div>
        <div class="sb-filter-label">Asignado a</div>
        <button class="pb active-all" id="pb-all" onclick="setPersonFilter('all')">
          <span class="pb-dot" style="background:var(--acc)"></span>Todos
        </button>
        <button class="pb" id="pb-martin" onclick="setPersonFilter('martin')">
          <span class="pb-dot" style="background:var(--martin-t)"></span>Martín
        </button>
        <button class="pb" id="pb-anita" onclick="setPersonFilter('anita')">
          <span class="pb-dot" style="background:var(--anita-t)"></span>Anita
        </button>
      </div>
      <div>
        <div class="sb-filter-label">Ambiente</div>
        <select id="inv-room-filter" onchange="setRoomFilter(this.value)">
          <option value="all">Todos los ambientes</option>
        </select>
      </div>
    </div>
  </div>

  <!-- ── MAIN ── -->
  <div id="main">

    <!-- PHOTOS VIEW -->
    <div id="photos-view">
      <div id="ph-head">
        <div>
          <div id="room-title">—</div>
          <div id="room-meta">Conectando…</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <span id="upload-status" style="font-size:12px;color:var(--t3)"></span>
          <button id="upload-btn" onclick="document.getElementById('file-input').click()">↑ Subir fotos</button>
        </div>
      </div>
      <input type="file" id="file-input" multiple accept="image/*" style="display:none" onchange="handleFiles(this.files)">
      <div id="photo-grid"><div id="grid-inner"></div></div>
    </div>

    <!-- INVENTORY VIEW -->
    <div id="inventory-view">
      <div id="inv-head">
        <div>
          <div id="inv-title">Inventario</div>
          <div id="inv-meta">—</div>
        </div>
        <button id="add-item-btn" onclick="openItemModal()">+ Agregar</button>
      </div>
      <div id="inv-list"></div>
    </div>

  </div><!-- /main -->
</div><!-- /app-body -->

<!-- ══════════ SCRIPT ══════════ -->
<script type="module">

const EMBEDDED_CONFIG = {
  firebase: {
    apiKey:"AIzaSyDp1PNABP2T-uNvbM20nPj6dhVaFKfeEdg",
    authDomain:"depto-fotos.firebaseapp.com",
    projectId:"depto-fotos",
    storageBucket:"depto-fotos.firebasestorage.app",
    messagingSenderId:"121291580762",
    appId:"1:121291580762:web:2cc86971796c93b6f87f63"
  },
  cloudName:"de7yeetek",
  cloudPreset:"utajrmom"
};

let db, _fb={}, CFG=null;

async function initFirebase(cfg){
  CFG=cfg;
  const V="11.1.0", base=`https://www.gstatic.com/firebasejs/${V}`;
  const [aM,fM]= await Promise.all([import(`${base}/firebase-app.js`),import(`${base}/firebase-firestore.js`)]);
  db=fM.getFirestore(aM.initializeApp(cfg.firebase));
  _fb={...fM};
  await seedRooms();
  listenRooms();
  listenInventory();
}

// ── Default rooms ──
const DEFAULT_ROOMS=[
  {id:"living",           name:"Living",               order:1},
  {id:"cocina",           name:"Cocina",               order:2},
  {id:"cuarto-servicio",  name:"Cuarto de Servicio",   order:3},
  {id:"lavadero",         name:"Lavadero",             order:4},
  {id:"hab-martin",       name:"Habitación Martín",    order:5},
  {id:"hab-anita",        name:"Oficina Papá",     order:6},
  {id:"hab-principal",    name:"Habitación Principal", order:7},
  {id:"vestidor",         name:"Vestidor",             order:8},
  {id:"placard-toilette", name:"Placard / Toilette",   order:9},
  {id:"pasillo",          name:"Pasillo Principal",    order:10},
];

async function seedRooms(){
  const {collection,getDocs,setDoc,doc,serverTimestamp}=_fb;
  const snap=await getDocs(collection(db,"rooms"));
  if(!snap.empty) return;
  for(const r of DEFAULT_ROOMS)
    await setDoc(doc(db,"rooms",r.id),{name:r.name,order:r.order,createdAt:serverTimestamp()});
}

// ── State ──
let rooms=[],currentRoomId=null,currentPhotos=[],inventoryAll=[];
let invPersonFilter="all",invRoomFilter="all";
let lbIndex=0,unsub=null,editingItemId=null,selectedPerson="",currentView="photos";

// ── Mobile drawer ──
window.openSidebar=()=>{
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("mob-overlay").classList.add("show");
};
window.closeSidebar=()=>{
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("mob-overlay").classList.remove("show");
};
window.mobAction=()=>{
  if(currentView==="photos") document.getElementById("file-input").click();
  else openItemModal();
};

// ── View switch ──
window.switchView=function(v){
  currentView=v;
  document.getElementById("photos-view").style.display    =v==="photos"   ?"flex":"none";
  document.getElementById("inventory-view").style.display =v==="inventory"?"flex":"none";
  document.getElementById("sb-rooms").style.display       =v==="photos"   ?"flex":"none";
  document.getElementById("sb-inv").style.display         =v==="inventory"?"flex":"none";
  ["tab-photos","tab-inv"].forEach(id=>document.getElementById(id).classList.remove("active"));
  ["mob-tab-photos","mob-tab-inv"].forEach(id=>document.getElementById(id).classList.remove("active"));
  document.getElementById(v==="photos"?"tab-photos":"tab-inv").classList.add("active");
  document.getElementById(v==="photos"?"mob-tab-photos":"mob-tab-inv").classList.add("active");
  // update mob action button
  document.getElementById("mob-action-btn").textContent=v==="photos"?"↑ Subir":"+ Agregar";
  // update mob room name
  if(v==="inventory") document.getElementById("mob-room-name").textContent="Inventario";
  else if(currentRoomId){
    const r=rooms.find(x=>x.id===currentRoomId);
    document.getElementById("mob-room-name").textContent=r?.name||"";
  }
  closeSidebar();
};

// ── Rooms ──
function listenRooms(){
  const {collection,query,orderBy,onSnapshot}=_fb;
  onSnapshot(query(collection(db,"rooms"),orderBy("order")),snap=>{
    rooms=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderSidebar();
    populateDropdowns();
    if(!currentRoomId&&rooms.length) selectRoom(rooms[0].id);
  });
}

function renderSidebar(){
  document.getElementById("room-list").innerHTML=rooms.map(r=>`
    <div class="room-item${r.id===currentRoomId?" active":""}" onclick="selectRoom('${r.id}')">
      <span>${esc(r.name)}</span>
      <span class="rc" id="rc-${r.id}"></span>
    </div>`).join("");
}

function populateDropdowns(){
  const opts=rooms.map(r=>`<option value="${r.id}">${esc(r.name)}</option>`).join("");
  document.getElementById("item-room").innerHTML='<option value="">Sin ambiente específico</option>'+opts;
  document.getElementById("inv-room-filter").innerHTML='<option value="all">Todos los ambientes</option>'+opts;
  document.getElementById("inv-room-filter").value=invRoomFilter;
}

window.selectRoom=function(id){
  currentRoomId=id;
  const r=rooms.find(x=>x.id===id);
  const name=r?.name||"";
  document.getElementById("room-title").textContent=name;
  document.getElementById("mob-room-name").textContent=name;
  document.getElementById("room-meta").textContent="Cargando…";
  renderSidebar();
  loadPhotos(id);
  closeSidebar();
};

// ── Photos ──
function loadPhotos(roomId){
  const {collection,query,orderBy,onSnapshot}=_fb;
  if(unsub) unsub();
  document.getElementById("grid-inner").innerHTML=Array(8).fill('<div class="skeleton"></div>').join("");
  unsub=onSnapshot(query(collection(db,"photos"),orderBy("uploadedAt","asc")),snap=>{
    currentPhotos=snap.docs.map(d=>({id:d.id,...d.data()})).filter(p=>p.roomId===roomId);
    renderGrid();
    const el=document.getElementById(`rc-${roomId}`);
    if(el) el.textContent=currentPhotos.length||"";
  });
}

function renderGrid(){
  const n=currentPhotos.length;
  document.getElementById("room-meta").textContent=`${n} ${n===1?"foto":"fotos"}`;
  if(n===0){
    document.getElementById("grid-inner").innerHTML=`
      <div class="empty-state" onclick="document.getElementById('file-input').click()">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.1" opacity=".35">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <p>Sin fotos — tocá para subir</p>
      </div>`;
    return;
  }
  document.getElementById("grid-inner").innerHTML=
    currentPhotos.map((p,i)=>`
      <div class="photo-card" onclick="openLightbox(${i})">
        <img src="${esc(p.url)}" alt="" loading="lazy">
        <div class="pco"></div>
      </div>`).join("")+
    `<div class="upload-card" onclick="document.getElementById('file-input').click()">
       <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
         <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
       </svg></div>`;
}

// ── Upload ──
async function compress(file,maxW=1400,q=0.82){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement("canvas");
        let w=img.width,h=img.height;
        if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
        c.width=w;c.height=h;
        c.getContext("2d").drawImage(img,0,0,w,h);
        c.toBlob(b=>res(b),"image/jpeg",q);
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

async function uploadCloud(blob){
  const fd=new FormData();
  fd.append("file",blob);
  fd.append("upload_preset",CFG.cloudPreset);
  const res=await fetch(`https://api.cloudinary.com/v1_1/${CFG.cloudName}/image/upload`,{method:"POST",body:fd});
  if(!res.ok) throw new Error("Cloudinary error "+res.status);
  return (await res.json()).secure_url;
}

window.handleFiles=async function(files){
  if(!files?.length||!currentRoomId) return;
  const arr=Array.from(files);
  const btn=document.getElementById("upload-btn");
  const mbtn=document.getElementById("mob-action-btn");
  const status=document.getElementById("upload-status");
  const bar=document.getElementById("progress-bar");
  const fill=document.getElementById("progress-fill");
  btn.disabled=true;mbtn.disabled=true;bar.style.display="block";
  let ok=0;
  for(let i=0;i<arr.length;i++){
    status.textContent=`Subiendo ${i+1}/${arr.length}…`;
    fill.style.width=`${(i/arr.length)*100}%`;
    try{
      const blob=await compress(arr[i]);
      const url=await uploadCloud(blob);
      const {addDoc,collection,serverTimestamp}=_fb;
      await addDoc(collection(db,"photos"),{roomId:currentRoomId,url,filename:arr[i].name,uploadedAt:serverTimestamp()});
      ok++;
    }catch(e){console.error(e);toast("Error subiendo "+arr[i].name);}
  }
  fill.style.width="100%";
  setTimeout(()=>{bar.style.display="none";fill.style.width="0%";},700);
  status.textContent="";
  btn.disabled=false;mbtn.disabled=false;
  if(ok) toast(`${ok} ${ok===1?"foto subida":"fotos subidas"} ✓`);
  document.getElementById("file-input").value="";
};

// ── Add room ──
window.showAddRoom=()=>{
  document.getElementById("add-room-btn").style.display="none";
  document.getElementById("add-room-form").style.display="block";
  document.getElementById("add-room-input").focus();
};
window.hideAddRoom=()=>{
  document.getElementById("add-room-btn").style.display="flex";
  document.getElementById("add-room-form").style.display="none";
  document.getElementById("add-room-input").value="";
};
window.saveRoom=async()=>{
  const name=document.getElementById("add-room-input").value.trim();
  if(!name) return;
  const maxOrd=rooms.reduce((m,r)=>Math.max(m,r.order||0),0);
  const {addDoc,collection,serverTimestamp}=_fb;
  await addDoc(collection(db,"rooms"),{name,order:maxOrd+1,createdAt:serverTimestamp()});
  window.hideAddRoom();
};
document.getElementById("add-room-input").addEventListener("keydown",e=>{
  if(e.key==="Enter") window.saveRoom();
  if(e.key==="Escape") window.hideAddRoom();
});

// ── Lightbox ──
window.openLightbox=function(idx){
  lbIndex=idx;
  document.getElementById("lightbox").classList.add("open");
  renderLb();
};
function renderLb(){
  const p=currentPhotos[lbIndex];if(!p) return;
  const room=rooms.find(r=>r.id===currentRoomId);
  document.getElementById("lb-img").src=p.url;
  document.getElementById("lb-label").textContent=room?.name||"";
  document.getElementById("lb-counter").textContent=`${lbIndex+1} / ${currentPhotos.length}`;
  document.getElementById("lb-prev").style.opacity=lbIndex>0?"1":"0.2";
  document.getElementById("lb-next").style.opacity=lbIndex<currentPhotos.length-1?"1":"0.2";
}
window.closeLightbox=()=>document.getElementById("lightbox").classList.remove("open");
window.lbNav=function(d){const n=lbIndex+d;if(n<0||n>=currentPhotos.length)return;lbIndex=n;renderLb();};
document.addEventListener("keydown",e=>{
  if(!document.getElementById("lightbox").classList.contains("open")) return;
  if(e.key==="ArrowLeft") window.lbNav(-1);
  if(e.key==="ArrowRight") window.lbNav(1);
  if(e.key==="Escape") window.closeLightbox();
});

// ── Inventory ──
function listenInventory(){
  const {collection,query,orderBy,onSnapshot}=_fb;
  onSnapshot(query(collection(db,"inventory"),orderBy("createdAt","desc")),snap=>{
    inventoryAll=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderInventory();
  });
}

function renderInventory(){
  let items=[...inventoryAll];
  if(invPersonFilter!=="all") items=items.filter(i=>i.assignedTo===invPersonFilter||i.assignedTo==="ambos");
  if(invRoomFilter!=="all")   items=items.filter(i=>i.room===invRoomFilter);
  const el=document.getElementById("inv-list");
  const n=items.length;
  document.getElementById("inv-meta").textContent=`${n} ${n===1?"elemento":"elementos"}`;
  const STATUS={"en-uso":"En uso","guardado":"Guardado","donar":"A donar","tirar":"A tirar"};
  if(n===0){
    el.innerHTML=`<div class="inv-empty">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.1" opacity=".35">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
      </svg>
      <span>Sin elementos — agregá con el botón +</span>
    </div>`;
    return;
  }
  el.innerHTML=items.map(item=>{
    const room=rooms.find(r=>r.id===item.room);
    const pC=item.assignedTo==="martin"?"badge-martin":item.assignedTo==="anita"?"badge-anita":"badge-ambos";
    const pL=item.assignedTo==="martin"?"Martín":item.assignedTo==="anita"?"Anita":"Ambos";
    const sL=STATUS[item.status]||"";
    return `<div class="item-card" onclick="openItemModal('${item.id}')">
      <div class="item-card-body">
        <div class="item-name">${esc(item.name)}</div>
        <div class="item-meta">
          <span class="badge ${pC}">${pL}</span>
          ${room?`<span style="color:var(--t3);font-size:12px">${esc(room.name)}</span>`:""}
          ${sL?`<span class="badge badge-status">${sL}</span>`:""}
        </div>
        ${item.notes?`<div class="item-notes">${esc(item.notes)}</div>`:""}
      </div>
      <button class="item-del" onclick="event.stopPropagation();deleteItem('${item.id}')" aria-label="Eliminar">✕</button>
    </div>`;
  }).join("");
}

window.setPersonFilter=function(p){
  invPersonFilter=p;
  document.getElementById("pb-all").className   ="pb"+(p==="all"   ?" active-all":"");
  document.getElementById("pb-martin").className="pb"+(p==="martin"?" active-m":"");
  document.getElementById("pb-anita").className ="pb"+(p==="anita" ?" active-a":"");
  renderInventory();
  closeSidebar();
};
window.setRoomFilter=function(r){invRoomFilter=r;renderInventory();};

// ── Item modal ──
window.openItemModal=function(idOrNull){
  editingItemId=typeof idOrNull==="string"?idOrNull:null;
  document.getElementById("modal-title").textContent=editingItemId?"Editar elemento":"Agregar elemento";
  if(editingItemId){
    const item=inventoryAll.find(i=>i.id===editingItemId)||{};
    document.getElementById("item-name").value=item.name||"";
    document.getElementById("item-room").value=item.room||"";
    document.getElementById("item-status").value=item.status||"en-uso";
    document.getElementById("item-notes").value=item.notes||"";
    selectPerson(item.assignedTo||"ambos");
  }else{
    document.getElementById("item-name").value="";
    document.getElementById("item-room").value="";
    document.getElementById("item-status").value="en-uso";
    document.getElementById("item-notes").value="";
    selectPerson("");
  }
  document.getElementById("item-modal").classList.add("open");
  setTimeout(()=>document.getElementById("item-name").focus(),80);
};
window.closeItemModal=()=>{
  document.getElementById("item-modal").classList.remove("open");
  editingItemId=null;selectedPerson="";
};
window.selectPerson=function(p){
  selectedPerson=p;
  const cl={martin:"sel-m",anita:"sel-a",ambos:"sel-b"};
  ["martin","anita","ambos"].forEach(k=>{
    document.getElementById("ps-"+k).className="ps-opt"+(k===p?" "+cl[k]:"");
  });
};
window.saveItem=async function(){
  const name=document.getElementById("item-name").value.trim();
  if(!name){toast("El nombre es obligatorio");return;}
  if(!selectedPerson){toast("Seleccioná a quién se asigna");return;}
  const data={name,assignedTo:selectedPerson,
    room:document.getElementById("item-room").value,
    status:document.getElementById("item-status").value,
    notes:document.getElementById("item-notes").value.trim()};
  const {collection,addDoc,doc,updateDoc,serverTimestamp}=_fb;
  if(editingItemId){
    await updateDoc(doc(db,"inventory",editingItemId),data);
    toast("Actualizado ✓");
  }else{
    await addDoc(collection(db,"inventory"),{...data,createdAt:serverTimestamp()});
    toast("Agregado ✓");
  }
  window.closeItemModal();
};
window.deleteItem=async function(id){
  if(!confirm("¿Eliminar este elemento?")) return;
  const {doc,deleteDoc}=_fb;
  await deleteDoc(doc(db,"inventory",id));
  toast("Eliminado");
};

// ── Config ──
window.saveConfig=async function(){
  const errEl=document.getElementById("config-err");
  const btn=document.getElementById("config-save");
  errEl.style.display="none";
  btn.textContent="Conectando…";btn.disabled=true;
  try{
    const raw=document.getElementById("cfg-firebase").value.trim();
    const match=raw.match(/\{[\s\S]*\}/);
    if(!match) throw new Error("No encontré el objeto firebaseConfig");
    const firebase=Function("return "+match[0])();
    if(!firebase.apiKey) throw new Error("apiKey no encontrado");
    const cloudName=document.getElementById("cfg-cloud").value.trim();
    const cloudPreset=document.getElementById("cfg-preset").value.trim();
    if(!cloudName||!cloudPreset) throw new Error("Completá los datos de Cloudinary");
    const cfg={firebase,cloudName,cloudPreset};
    localStorage.setItem("apt-cfg-v2",JSON.stringify(cfg));
    document.getElementById("config-overlay").classList.remove("open");
    await initFirebase(cfg);
    toast("¡Conectado! ✓");
  }catch(e){
    errEl.textContent="Error: "+e.message;errEl.style.display="block";
  }
  btn.textContent="Conectar →";btn.disabled=false;
};

// ── Utils ──
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2800);
}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// ── Boot ──
(async()=>{
  await initFirebase(EMBEDDED_CONFIG);
})();

</script>
